<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Profissional</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        /* CONTAINER PRINCIPAL */
        
        .container {
            width: 90%;
            max-width: 1100px;
            display: flex;
            align-items: center;
        }
        /* IMAGEM (MAIOR) */
        
        .image {
            width: 60%;
            height: 420px;
            /* maior que o texto */
            overflow: hidden;
        }
        
        .image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* BLOCO AZUL (MENOR) */
        
        .content_escolhe {
            width: 40%;
            background: #0d3b8e;
            color: #fff;
            padding: 50px 40px;
            height: 320px;
            /* menor que a imagem */
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-left: -60px;
            /* sobreposição tipo da imagem */
            position: relative;
            z-index: 2;
        }
        
        .content_escolhe h2 {
            font-size: 26px;
            margin-bottom: 20px;
        }
        
        .content_escolhe p {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        /* BOTÃO */
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            color: #0d3b8e;
            padding: 12px 22px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
        }
        
        .btn:hover {
            background: #e6e6e6;
        }
        /* RESPONSIVO */
        
        @media(max-width:768px) {
            .container {
                flex-direction: column;
            }
            .image {
                width: 100%;
                height: 300px;
            }
            .content_escolhe {
                width: 100%;
                margin-left: 0;
                margin-top: -40px;
                /* mantém efeito sobreposto */
                height: auto;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="image">
            <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d" alt="Equipe">
        </div>

        <div class="content_escolhe">
            <h2>Interessado em uma carreira na KPMG?</h2>
            <p>
                Queremos apoiá-lo em sua jornada para criar uma carreira impactante. Junte-se a nós e você também pode fazer trabalhos que realmente importam.
            </p>

            <a href="#" class="btn">
            Encontre sua próxima oportunidade →
        </a>
        </div>

    </div>

</body>

</html>
