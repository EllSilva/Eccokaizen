<div>

    <!-- full Title -->
    <div class="full-title">
        <div class="container">
            <!-- Page Heading/Breadcrumbs -->
            <h1 class="mt-4 mb-3"> FeedBack Dos Clientes </h1>
            <div class="breadcrumb-main">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item">
                        <a href="index.html">Home</a>
                    </li>
                    <li class="breadcrumb-item active">Testemunhos</li>
                </ol>
            </div>
        </div>
    </div>



    <div class="portfolio-col">
        <div class="container">
            <div class="row">

                <div class="col-lg-3 col-md-4 col-sm-6 portfolio-item" v-for="(item, i) in paginatedData" :key="i">
                    <div class="card h-100">

                        <div class="card-body">
                            <p>{{ item.descricao }}</p>
                            <h4><a @click="openModal(item)">{{ item.autor }}</a></h4>
                        </div>
                        <a class="hover-box" @click="openModal(item)">
                            <div class="dot-full">
                                <i class="fas fa-link"></i>
                            </div>
                            <img class="card-img-top" :src="caminho_img + item.imagem" alt="" srcset=""
                                style=" height: 150px; object-fit: cover;">

                        </a>
                    </div>
                </div>


                <!-- MODAL -->
                <div class="modal" v-if="modalOpen" @click.self="closeModal">
                    <div class="modal-content">
                        <span class="close" @click="closeModal">&times;</span>

                        <p>{{ selected.descricao }}</p>

                        <div class="user">

                            <div>
                                <h4>{{ selected.autor }}</h4>
                                <span>FeedBack</span>
                                <img :src="caminho_img +selected.imagem" style="  object-fit: contain;">
                            </div>
                        </div>
                    </div>
                </div>




            </div>

 

            <div class="pagination_bar">
                <!-- Pagination -->
                <ul class="pagination justify-content-center">
                    <li class="page-item">
                        <a class="page-link" href="#" aria-label="Previous" @click="prevPage">
                            <span aria-hidden="true">&laquo;</span>
                            <span class="sr-only">Previous</span>
                        </a>
                    </li>
                    <li class="page-item" v-for="page in totalPages" :key="page" @click="goToPage(page)"
                        :class="['page-btn', { active: currentPage === page }]">
                        <a class="page-link" href="#">   {{ page }}</a>
                    </li>


                    
                    <li class="page-item">
                        <a class="page-link" href="#" aria-label="Next" @click="nextPage">
                            <span aria-hidden="true">&raquo;</span>
                            <span class="sr-only">Next</span>
                        </a>
                    </li>
                </ul>
            </div>

        </div>
        <!-- /.container -->
    </div>







</div>
